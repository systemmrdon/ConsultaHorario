<script>
const SHEETS={
INTEGRADO:{id:'1j33kiPqwtzZNuvkBgYDaIiXZvVMY_J0qWAtRfYGdnD8',gid:'1357770092'},
SUPERIOR:{id:'14ALXZgFIT68ee9ajuIdG63SpGVm0HyTjwp63-J6vRyg',gid:'669887707'}
};

let dadosGlobais=[],turmasDaPlanilha=[],semanasAgrupadas={};

  function deveCompararDia(dataStr){

  const [d,m,a] = dataStr.split('/');
  const data = new Date(a, m-1, d);

  const hoje = new Date();

  // remove hora
  hoje.setHours(0,0,0,0);
  data.setHours(0,0,0,0);

  // segunda-feira da semana atual
  const segunda = new Date(hoje);
  const diaSemana = segunda.getDay();
  const ajuste = diaSemana === 0 ? -6 : 1 - diaSemana;
  segunda.setDate(segunda.getDate() + ajuste);
  segunda.setHours(0,0,0,0);

  // sábado da semana atual
  const sabado = new Date(segunda);
  sabado.setDate(sabado.getDate() + 5);
  sabado.setHours(23,59,59,999);

  // só compara dias da semana atual
  if(data < segunda) return false;
  if(data > sabado) return false;

  // só compara de hoje para frente
  if(data < hoje) return false;

  return true;
}

  function semanaSelecionadaEhAtual(){

  const semanaSelecionada =
    document.getElementById('selectSemana').value;

  return semanaSelecionada === getSemanaAtual();
}

  function isSemanaPassada(dataStr){
  const [d,m,a] = dataStr.split('/');
  const data = new Date(a, m-1, d);

  const hoje = new Date();

  // pega segunda-feira da semana atual
  const dia = hoje.getDay();
  const diff = hoje.getDate() - dia + (dia === 0 ? -6 : 1);
  const segundaAtual = new Date(hoje.setDate(diff));

  return data < segundaAtual;
}

function limparPainelAlteracoes(){
  document.getElementById("conteudoAlteracoes").innerText = "";
  document.getElementById("painelAlteracoes").style.display = "none";
}
  
function trocarModalidade(){
  window.trocouModalidade = true;

  limparPainelAlteracoes(); // 🔥 ESSENCIAL

  init();
}

  function trocarSemana(){
  limparPainelAlteracoes(); // 🔥 ESSENCIAL
  renderizarTabela();
}

function salvarSnapshotAtual() {

  if(!semanaSelecionadaEhAtual()){
    return;
  }

  const sem = document.getElementById('selectSemana').value;
  const mod = document.getElementById('selectModalidade').value;

  const snapshot = {
    tempo:new Date().toISOString(),
    dados:dadosGlobais
  };

  localStorage.setItem(
    `snapshot_${mod}_${sem}`,
    JSON.stringify(snapshot)
  );
}

function obterSnapshotAntigo() {
  const sem = document.getElementById('selectSemana').value;
  const mod = document.getElementById('selectModalidade').value;

  const data = localStorage.getItem(`snapshot_${mod}_${sem}`);
  return data ? JSON.parse(data) : null;
}

function valorMudou(v1, v2){
  const t1 = (v1 || "").trim();
  const t2 = (v2 || "").trim();

  if (t1 !== t2) return true;

  const n1 = normalizarTexto(t1);
  const n2 = normalizarTexto(t2);

  return n1 !== n2;
}
  
function verificarMudancaAoAbrir() {

  if(!semanaSelecionadaEhAtual()){
    return;
  }
  const sem = document.getElementById('selectSemana').value;
  const mod = document.getElementById('selectModalidade').value;

  const chave = `snapshot_${mod}_${sem}`;

  const antigoRaw = localStorage.getItem(chave);

  // 🔥 Se não existe snapshot → salva e sai
  if (!antigoRaw) {
    salvarSnapshotAtual();
    return;
  }

  const antigo = JSON.parse(antigoRaw);
  const novo = dadosGlobais;

  const agrupado = {};
  let ultimoDia = "";

  for (let i = 1; i < novo.length; i++) {

    if (novo[i][0]) ultimoDia = novo[i][0];
    const diaAtual = ultimoDia;

    if (!diaAtual) continue;
    if (!deveCompararDia(diaAtual)) continue;

    const horario = (novo[i][1] || "").trim();
    const horarioNorm = normalizarTexto(horario);

    // 🔥 IGNORA INTERVALO
    if (
      !horario ||
      horarioNorm.includes("INTERVALO") ||
      horarioNorm.includes("[+]") ||
      horarioNorm.includes("*") ||
      horarioNorm.includes("[R]")
    ) continue;

    for (let j = 2; j < novo[i].length; j++) {

      const vNovo = (novo[i][j] || "").trim();
      const vAntigo = (antigo.dados?.[i]?.[j] || "").trim();

      if (!valorMudou(vNovo, vAntigo)) continue;

      const turma = (dadosGlobais[0][j] || "").trim();
      if (!turma) continue;

      const chaveItem = `${diaAtual}__${turma}__${horario}`;

      if (!agrupado[chaveItem]) {
        agrupado[chaveItem] = {
          dia: diaAtual,
          turma,
          horario,
          alteracoes: []
        };
      }

      agrupado[chaveItem].alteracoes.push({
        antes: vAntigo || "(vazio)",
        depois: vNovo || "(vazio)"
      });
    }
  }

  const listaFinal = Object.values(agrupado);

  if (listaFinal.length > 0) {
    mostrarAvisoAlteracoes(listaFinal);
  } else {
    document.getElementById("painelAlteracoes").style.display = "none";
  }

  salvarSnapshotAtual();
}

function mostrarMensagemPainel(titulo, texto){

  const tituloPainel =
    document.querySelector("#painelAlteracoes strong");

  tituloPainel.innerText = titulo;

  document.getElementById("conteudoAlteracoes").innerText = texto;

  document.getElementById("painelAlteracoes").style.display = "block";
}
  
function mostrarAvisoAlteracoes(lista) {

  let texto = "⚠️ ALTERAÇÕES DE AULAS DETECTADAS:\n\n";

  lista.forEach(item => {

    texto += `📅 Dia: ${item.dia}\n`;
    texto += `🏫 Turma: ${item.turma}\n`;
    texto += `⏰ Horário: ${item.horario}\n`;

    item.alteracoes.forEach(a => {
      texto += `➡️ ${a.antes} → ${a.depois}\n`;
    });

    texto += "\n";
  });

  document.getElementById("conteudoAlteracoes").innerText = texto;
  document.getElementById("painelAlteracoes").style.display = "block";
}

  function fecharPainel(){

}

function copiarAlteracoes(){
  const texto = document.getElementById("conteudoAlteracoes").innerText;

  navigator.clipboard.writeText(texto).then(()=>{
    alert("Copiado!");
  });
}
  
const FERIADOS=[
"01/01/2026","16/02/2026","17/02/2026","18/02/2026","03/04/2026","20/04/2026","21/04/2026","01/05/2026",
"04/06/2026","05/06/2026","07/09/2026","12/10/2026","02/11/2026",
"15/11/2026","25/12/2026"
];

function normalizarTexto(txt){
    return (txt || "")
        .toString()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "") // remove acentos
        .replace(/\s+/g, " ") // espaços duplos
        .trim()
        .toUpperCase();
}
  
function isFeriado(d){return FERIADOS.includes(d);}

/* 🔥 NOVA FUNÇÃO (BUSCA COM HIGHLIGHT) */
function filtrarProfessor(){
  const termo = document.getElementById('searchProf').value.toUpperCase();
  const tabela = document.getElementById('tabelaHorario');
  const celulas = tabela.getElementsByTagName('td');

  for(let i=0;i<celulas.length;i++){
    const td = celulas[i];
    const txt = td.innerText.toUpperCase();

    /* 🔥 IGNORA COLUNA DE HORÁRIO E CABEÇALHO DO DIA */
    if(
      td.classList.contains('time-col') ||
      td.parentElement.classList.contains('day-divider')
    ){
      td.classList.remove('opaco');
      td.classList.remove('highlight');
      continue;
    }

    if(termo && txt.includes(termo)){
      td.classList.add('highlight');
      td.classList.remove('opaco');
    } else if(termo){
      td.classList.remove('highlight');
      td.classList.add('opaco');
    } else {
      td.classList.remove('highlight');
      td.classList.remove('opaco');
    }
  }
}

function parseCSV(text){
return text.split(/\r?\n/).map(l=>{
let r=[],c='',q=false;
for(let i=0;i<l.length;i++){
let ch=l[i];
if(ch=='"') q=!q;
else if(ch==','&&!q){r.push(c.trim());c='';}
else c+=ch;
}
r.push(c.trim());
return r;
});
}

async function init(){

  document.getElementById('searchProf').value = "";

  const mod = document.getElementById('selectModalidade').value;

  // 🔥 LIMPA PAINEL ao trocar
  document.getElementById("painelAlteracoes").style.display = "none";

  // 🔥 FLAG DE TROCA
  window.trocouModalidade = true;

  const url = `https://docs.google.com/spreadsheets/d/${SHEETS[mod].id}/export?format=csv&gid=${SHEETS[mod].gid}`;
  const res = await fetch(url);

  dadosGlobais = parseCSV(await res.text());

  processarDados();

  // 🔥 GARANTE verificação após tudo carregado
  setTimeout(() => {
    verificarMudancaAoAbrir();
  }, 200);
}
function getCursoInfo(t){
t=t.toUpperCase();
if(t.includes("AGROEC")) return {cl:"c-agroec",rgb:[232,245,233]};

if(t.includes("GEO")) return {cl:"c-geo",rgb:[243,229,245]};
if(t.includes("MAT")) return {cl:"c-mat",rgb:[224,247,250]};
if(t.includes("AGRONEG")) return {cl:"c-agroneg",rgb:[239,235,233]};

function ordenarDatasBR(arr){
return arr.sort((a,b)=>{
const pa=a.split('/'),pb=b.split('/');
return new Date(pa[2],pa[1]-1,pa[0]) - new Date(pb[2],pb[1]-1,pb[0]);
});
}

function getSemanaAtual(){
  const hoje = new Date();

  // calcula segunda-feira da semana atual
  const dia = hoje.getDay(); // 0 = domingo
  const diff = hoje.getDate() - dia + (dia === 0 ? -6 : 1);

  const segunda = new Date(hoje.setDate(diff));

  const d = String(segunda.getDate()).padStart(2,'0');
  const m = String(segunda.getMonth()+1).padStart(2,'0');
  const a = segunda.getFullYear();

  return `${d}/${m}/${a}`;
}
  
function processarDados(){
semanasAgrupadas={};
turmasDaPlanilha=dadosGlobais[0].slice(2).filter(t=>t);
let ultima="";
for(let i=1;i<dadosGlobais.length;i++){
let r=[...dadosGlobais[i]];
if(r[0]) ultima=r[0];
r[0]=ultima;
if(!r[0]) continue;

const [d,m,a]=r[0].split('/');
const dt=new Date(a,m-1,d);
const seg=new Date(dt.setDate(dt.getDate()-dt.getDay()+1)).toLocaleDateString('pt-BR');

if(!semanasAgrupadas[seg]) semanasAgrupadas[seg]={dias:{}};
if(!semanasAgrupadas[seg].dias[r[0]]) semanasAgrupadas[seg].dias[r[0]]=[];
semanasAgrupadas[seg].dias[r[0]].push(r);
}

const sel=document.getElementById('selectSemana');
sel.innerHTML="";
const semanaAtual = getSemanaAtual();

ordenarDatasBR(Object.keys(semanasAgrupadas)).forEach(s=>{
  sel.innerHTML+=`<option value="${s}">Semana de ${s}</option>`;
});

/* 🔥 SELECIONA SEMANA ATUAL SE EXISTIR */
if(semanasAgrupadas[semanaAtual]){
  sel.value = semanaAtual;
}

renderizarTabela();
}

function getTurmasAtivasNaSemana(dias){
return turmasDaPlanilha.filter(t=>{
const idx=dadosGlobais[0].indexOf(t);
return Object.values(dias).some(d=>d.some(r=>{
const v=(r[idx]||"").trim();
return v && v!=="-" && !r[1].toUpperCase().includes("INTERVALO");
}));
});
}

function coletarVagasDoDia(dia) {
  const sem = document.getElementById('selectSemana').value;
  const dias = semanasAgrupadas[sem].dias;

  const vagas = [];

  if (!dias[dia]) return vagas;

  dias[dia].forEach(r => {
    const horario = r[1];

    turmasDaPlanilha.forEach(turma => {
      const idx = dadosGlobais[0].indexOf(turma);
      const val = (r[idx] || "").toUpperCase();

      if (
        val.includes("RESERVA ENSINO") ||
        val.includes("ESTUDOS INDIVIDUAIS")
      ) {
        vagas.push({
          turma,
          horario
        });
      }
    });
  });

  return vagas;
}

function gerarRelatorioDia(dia) {
  const vagas = coletarVagasDoDia(dia);

  let texto = `Olá Professores, na data de hoje (${dia}), identificamos várias turmas com aulas vagas. Segue a lista das turmas e horários.\n\n`;

  if (vagas.length === 0) {
    texto += "Não há aulas vagas no dia informado.";
    return texto;
  }

  // 🔥 AGRUPAMENTO
  const agrupado = {};

  vagas.forEach(v => {
    if (!agrupado[v.turma]) {
      agrupado[v.turma] = [];
    }

    agrupado[v.turma].push(v.horario);
  });

  // 🔥 MONTAGEM FINAL
  Object.keys(agrupado).forEach(turma => {

    const horariosUnicos = [...new Set(agrupado[turma])];

    texto += `📅 DATA: ${dia}\n`;
    texto += `🏫 TURMA: ${turma}\n`;
    texto += `⏰ AULAS VAGAS: ${horariosUnicos.join(", ")}\n\n`;
  });

  return texto;
}

function mostrarRelatorioDia(dia){

  const texto = gerarRelatorioDia(dia);

  mostrarMensagemPainel(
    `📅 Relatório de aulas vagas - ${dia}`,
    texto
  );
}

function gerarRelatorioSemana() {
  const sem = document.getElementById('selectSemana').value;
  const dias = semanasAgrupadas[sem].dias;

  let texto = `Olá Professores, identificamos várias turmas com aula vaga esta semana. Segue a lista dos dias, turmas e horários.\n\n`;

  const agrupado = {};

  // 🔥 AGRUPA DIA + TURMA
  Object.keys(dias).forEach(dia => {
    const vagas = coletarVagasDoDia(dia);

    vagas.forEach(v => {
      const chave = `${dia}__${v.turma}`;

      if (!agrupado[chave]) {
        agrupado[chave] = {
          dia,
          turma: v.turma,
          horarios: []
        };
      }

      agrupado[chave].horarios.push(v.horario);
    });
  });

  const listaFinal = Object.values(agrupado);

  if (listaFinal.length === 0) {

  texto += "Não há aulas vagas na semana.";

  mostrarMensagemPainel(
    "📊 Relatório semanal de aulas vagas",
    texto
  );

  return;
}

  // 🔥 ORGANIZA POR DIA
  listaFinal.sort((a, b) => {
    const [da, ma, aa] = a.dia.split('/');
    const [db, mb, ab] = b.dia.split('/');
    return new Date(aa, ma-1, da) - new Date(ab, mb-1, db);
  });

  let diaAtual = "";

  listaFinal.forEach(item => {

    // 🔥 quebra por dia
    if (item.dia !== diaAtual) {
      texto += `📅 DATA: ${item.dia}\n\n`;
      diaAtual = item.dia;
    }

    const horariosUnicos = [...new Set(item.horarios)];

    texto += `🏫 TURMA: ${item.turma}\n`;
    texto += `⏰ AULAS VAGAS: ${horariosUnicos.join(", ")}\n\n`;
  });

  mostrarMensagemPainel(
  "📊 Relatório semanal de aulas vagas",
  texto
);
}
